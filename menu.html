<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speisekarte | Gastro HALLE</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
:root {
    --accent: #c96a2b;
    --cream: #f8f4ee;
    --dark: #0f0f0f;
    --page-w: 400px;
    --page-h: 560px;
    --anim-speed: 0.8s;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden; /* IMPORTANT FIX */
}

body {
    background: radial-gradient(circle at center, #1a1a1a, #0a0a0a);
    color: var(--cream);
    font-family: 'Plus Jakarta Sans', sans-serif;
    display: flex;
    flex-direction: column;
}

/* ================= NAVBAR ================= */
#navbar {
    height: 70px;
    padding: 0 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(17,17,17,0.9);
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.brand {
    display: flex;
    align-items: center;
    gap: 12px;
    color: white;
    text-decoration: none;
}

.nav-logo {
    height: 40px;
}

.nav-cta {
    padding: 0.6rem 1.2rem;
    border: 1px solid var(--accent);
    border-radius: 50px;
    color: var(--accent);
    text-decoration: none;
    font-size: 0.7rem;
}

/* ================= SCENE ================= */
#main-content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 2000px;
    overflow: hidden; /* FIX OVERFLOW */
}

#book-container {
    position: relative;
    width: var(--page-w);
    height: var(--page-h);
    transform-style: preserve-3d;
    transition: transform var(--anim-speed) ease;
    max-width: 95vw; /* FIX MOBILE */
    max-height: 70vh;
}

/* IMPORTANT FIX MOBILE CENTRING */
@media (max-width: 850px) {
    :root {
        --page-w: 85vw;
        --page-h: 65vh;
    }

    #book-container.is-open {
        transform: translateX(0);
    }
}

/* ================= SHEETS ================= */
.sheet {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    transform-origin: left;
    transform-style: preserve-3d;
    transition: transform var(--anim-speed) cubic-bezier(0.645, 0.045, 0.355, 1);
}

.page-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 0 4px 4px 0;
    overflow: hidden;
    background: #1a1a1a;
    box-shadow: 5px 5px 20px rgba(0,0,0,0.5);
}

.page-face img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* FIX OVERFLOW IMAGE */
    background: #1a1a1a;
}

.back {
    transform: rotateY(180deg);
}

.sheet.flipped {
    transform: rotateY(-180deg);
}

/* ================= CLICK ZONES (FIX OVERFLOW) ================= */
.click-layer {
    position: absolute;
    width: 100%; /* FIXED (was 100vw) */
    height: 100%;
    display: flex;
    z-index: 500;
}

.click-area {
    flex: 1;
    cursor: pointer;
}

/* ================= FOOTER ================= */
#footer-controls {
    height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,10,10,0.9);
}

.page-info {
    font-family: 'Cormorant Garamond', serif;
    color: var(--accent);
}

/* ================= MOBILE SAFETY ================= */
body {
    touch-action: manipulation;
    overscroll-behavior: none;
}
</style>
</head>

<body>

<audio id="flip-sound" src="https://www.soundjay.com/misc/sounds/page-flip-01a.mp3"></audio>

<nav id="navbar">
    <a href="index.html" class="brand">
        <img src="logo.jpg" class="nav-logo">
        <span>Gastro HALLE</span>
    </a>
    <a href="index.html" class="nav-cta">Startseite</a>
</nav>

<div id="main-content">
    <div id="book-container"></div>

    <div class="click-layer">
        <div class="click-area" onclick="prevSheet()"></div>
        <div class="click-area" onclick="nextSheet()"></div>
    </div>
</div>

<div id="footer-controls">
    <div class="page-info">
        SEITE <span id="current-page">1</span> VON 14
    </div>
</div>

<script>
const totalImages = 14;
const totalSheets = totalImages / 2;

let currentIdx = 0;
let container = document.getElementById("book-container");
let audio = document.getElementById("flip-sound");

function init() {
    for (let i = 0; i < totalSheets; i++) {

        const sheet = document.createElement("div");
        sheet.className = "sheet";
        sheet.style.zIndex = totalSheets - i;

        const p1 = i * 2 + 1;
        const p2 = i * 2 + 2;

        sheet.innerHTML = `
            <div class="page-face front">
                <img src="Pmenu/imag-${p1}.png">
            </div>
            <div class="page-face back">
                <img src="Pmenu/imag-${p2}.png">
            </div>
        `;

        container.appendChild(sheet);
    }

    updateUI();
}

/* ================= NEXT ================= */
function nextSheet() {
    const sheets = document.querySelectorAll(".sheet");

    if (currentIdx < totalSheets) {
        sheets[currentIdx].classList.add("flipped");

        currentIdx++;

        audio.currentTime = 0;
        audio.play().catch(()=>{});

        updateUI();
    }
}

/* ================= PREV ================= */
function prevSheet() {
    const sheets = document.querySelectorAll(".sheet");

    if (currentIdx > 0) {
        currentIdx--;

        sheets[currentIdx].classList.remove("flipped");

        audio.currentTime = 0;
        audio.play().catch(()=>{});

        updateUI();
    }
}

/* ================= UI ================= */
function updateUI() {

    if (currentIdx > 0) {
        container.classList.add("is-open");
    } else {
        container.classList.remove("is-open");
    }

    document.getElementById("current-page").innerText =
        currentIdx === 0 ? 1 : currentIdx * 2;
}

/* ================= INIT ================= */
init();
</script>

</body>
</html>
