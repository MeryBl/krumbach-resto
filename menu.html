<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Speisekarte | Gastro HALLE</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
:root {
  --gold:#c9a96e;
  --ink:#0d0d0d;
  --cream:#faf6f0;
  --nav-h:64px;
  --foot-h:96px;
  --flip-speed:0.75s;
}

/* RESET */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body {
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--ink);
  font-family:'Jost',sans-serif;
}

/* BACKGROUND SAFE */
body::before {
  content:'';
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  background:
    radial-gradient(circle at top, #2a1f0e, transparent 70%),
    radial-gradient(circle at bottom, #1a1206, transparent 70%);
}

/* NAV */
#navbar {
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:var(--nav-h);
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 14px;
  background:rgba(10,10,10,0.95);
  color:var(--cream);
}

/* SCENE */
#scene {
  position:fixed;
  top:var(--nav-h);
  bottom:var(--foot-h);
  left:0;
  right:0;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  perspective:1600px;
  padding:0 10px;
}

/* BOOK WRAP */
#book-wrap {
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  max-width:100%;
  max-height:100%;
}

/* BOOK */
#book {
  position:relative;
  transform-style:preserve-3d;
}

/* SHEETS */
.sheet {
  position:absolute;
  top:0;
  left:0;
  transform-origin:right;
  transition:transform var(--flip-speed) ease;
  cursor:pointer;
}

.sheet.flipped {
  transform:rotateY(-180deg);
}

.page-face {
  position:absolute;
  inset:0;
  backface-visibility:hidden;
  overflow:hidden;
}

.page-face img {
  width:100%;
  height:100%;
  object-fit:contain;
  background:#111;
}

.page-face.back {
  transform:rotateY(180deg);
}

/* FOOTER */
#footer {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:var(--foot-h);
  background:rgba(10,10,10,0.95);
  color:var(--cream);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
}

/* SOUND BUTTON */
#sound-btn {
  position:fixed;
  bottom:calc(var(--foot-h) + 10px);
  right:12px;
  width:34px;
  height:34px;
  border-radius:50%;
  background:#111;
  border:1px solid #333;
  color:var(--gold);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1001;
}

/* MOBILE FIX */
@media (max-width:768px) {
  #scene {
    perspective:1000px;
  }

  #book-wrap {
    transform:scale(0.92);
  }
}
</style>
</head>

<body>

<!-- NAV -->
<nav id="navbar">
  <div>Gastro HALLE</div>
  <div><span id="pg-cur">1</span> / <span id="pg-total">14</span></div>
</nav>

<!-- SCENE -->
<div id="scene">
  <div id="book-wrap">
    <div id="book"></div>
  </div>
</div>

<!-- FOOTER -->
<div id="footer">
  <div id="page-label">Menu</div>
</div>

<!-- SOUND -->
<div id="sound-btn"><i class="fa fa-volume-high"></i></div>

<script>

const TOTAL = 14;
const sheets = [];
let current = 0;
let anim = false;

const book = document.getElementById("book");

/* =========================
   FIX RESPONSIVE SIZE
========================= */
function getSize() {
  const navH = 64;
  const footH = 96;

  const hAvail = window.innerHeight - navH - footH;
  const wAvail = window.innerWidth;

  const aspect = 3 / 4;

  const isMobile = window.innerWidth < 768;

  if (isMobile) {
    let h = hAvail * 0.85;
    let w = h * aspect;

    if (w > wAvail * 0.95) {
      w = wAvail * 0.95;
      h = w / aspect;
    }

    return { w, h };
  }

  let h = hAvail * 0.9;
  let w = h * aspect * 2;

  if (w > wAvail * 0.85) {
    w = wAvail * 0.85;
    h = (w / 2) / aspect;
  }

  return { w, h };
}

/* =========================
   BUILD BOOK
========================= */
function build() {
  document.querySelectorAll(".sheet").forEach(e => e.remove());
  sheets.length = 0;

  const { w, h } = getSize();
  const pageW = w / 2;

  book.style.width = pageW + "px";
  book.style.height = h + "px";

  for (let i = 0; i < TOTAL / 2; i++) {

    const p1 = i * 2 + 1;
    const p2 = i * 2 + 2;

    const s = document.createElement("div");
    s.className = "sheet";
    s.style.width = pageW + "px";
    s.style.height = h + "px";
    s.style.zIndex = TOTAL - i;

    s.innerHTML = `
      <div class="page-face front">
        <img src="Pmenu/imag-${p1}.png">
      </div>
      <div class="page-face back">
        <img src="Pmenu/imag-${p2}.png">
      </div>
    `;

    book.appendChild(s);
    sheets.push(s);
  }

  apply();
}

/* =========================
   APPLY STATE
========================= */
function apply() {
  sheets.forEach((s, i) => {
    if (i < current) s.classList.add("flipped");
    else s.classList.remove("flipped");
  });

  document.getElementById("pg-cur").innerText = current + 1;
}

/* =========================
   NAV
========================= */
function next() {
  if (anim || current >= sheets.length) return;
  anim = true;

  sheets[current].classList.add("flipped");
  current++;

  apply();
  setTimeout(() => anim = false, 750);
}

function prev() {
  if (anim || current <= 0) return;
  anim = true;

  current--;
  sheets[current].classList.remove("flipped");

  apply();
  setTimeout(() => anim = false, 750);
}

/* =========================
   TOUCH FIX
========================= */
let startX = null;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  if (startX === null) return;

  const dx = e.changedTouches[0].clientX - startX;

  if (Math.abs(dx) > 40) {
    dx < 0 ? next() : prev();
  }

  startX = null;
});

/* CLICK NAV */
document.addEventListener("click", e => {
  if (e.clientX < window.innerWidth / 2) prev();
  else next();
});

/* RESIZE */
window.addEventListener("resize", build);

/* INIT */
window.onload = build;

</script>

</body>
</html>
