<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speisekarte | Gastro HALLE</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #c96a2b;
            --page-w: 360px;
            --page-h: 560px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* FOND FIXE IMAG-LEFT */
        #bg-static {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('Pmenu/imag-left.png') no-repeat center center;
            background-size: cover;
            filter: brightness(0.2);
            z-index: -1;
        }

        #navbar {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.6);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
        }

        /* SCÈNE PRINCIPALE */
        #main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            touch-action: none; /* Désactive le scroll vertical pour le swipe */
        }

        #book-container {
            position: relative;
            width: var(--page-w);
            height: var(--page-h);
            max-width: 85vw;
            max-height: 70vh;
        }

        /* LES PAGES */
        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow: hidden;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Animation de sortie (Glisse vers la gauche) */
        .page.exit-left {
            transform: translateX(-120%) rotate(-10deg);
            opacity: 0;
            pointer-events: none;
        }

        /* FOOTER */
        #footer {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.8);
        }

        .counter {
            font-size: 1rem;
            letter-spacing: 2px;
            color: var(--accent);
            font-weight: 600;
        }

        /* Indications Swipe */
        .hint {
            position: absolute;
            bottom: 20px;
            font-size: 0.7rem;
            opacity: 0.5;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="bg-static"></div>

    <nav id="navbar">
        <span style="font-weight:700; letter-spacing: 1px;">GASTRO HALLE</span>
    </nav>

    <div id="main-content">
        <div id="book-container" id="swipe-zone">
            </div>
        <div class="hint">← Glisser pour tourner →</div>
    </div>

    <div id="footer">
        <div class="counter">SEITE <span id="current-idx">1</span> / <span id="total-idx">15</span></div>
    </div>

    <audio id="flip-sound" src="https://www.soundjay.com/misc/sounds/page-flip-01a.mp3"></audio>

    <script>
        const images = [];
        for(let i=1; i<=14; i++) images.push(`Pmenu/imag-${i}.png`);
        images.push(`Pmenu/imag-end.png`);

        const container = document.getElementById('book-container');
        const audio = document.getElementById('flip-sound');
        const currentLabel = document.getElementById('current-idx');
        const totalLabel = document.getElementById('total-idx');

        let currentIndex = 0;
        totalLabel.innerText = images.length;

        // Initialisation des pages
        function init() {
            images.forEach((src, i) => {
                const div = document.createElement('div');
                div.className = 'page';
                div.style.zIndex = images.length - i;
                div.innerHTML = `<img src="${src}" alt="Menu ${i+1}">`;
                container.appendChild(div);
            });
        }

        function updateUI() {
            currentLabel.innerText = currentIndex + 1;
            const pages = document.querySelectorAll('.page');
            
            pages.forEach((page, i) => {
                if (i < currentIndex) {
                    page.classList.add('exit-left');
                } else {
                    page.classList.remove('exit-left');
                }
            });
        }

        function playSound() {
            audio.currentTime = 0;
            audio.play().catch(()=>{});
        }

        // GESTION DU SWIPE
        let touchStartX = 0;
        let touchEndX = 0;

        const mainContent = document.getElementById('main-content');

        mainContent.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, false);

        mainContent.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, false);

        function handleSwipe() {
            const threshold = 50; // Distance minimum pour valider le swipe
            if (touchStartX - touchEndX > threshold) {
                // Swipe vers la GAUCHE -> Page Suivante
                if (currentIndex < images.length - 1) {
                    currentIndex++;
                    playSound();
                    updateUI();
                }
            }
            if (touchEndX - touchStartX > threshold) {
                // Swipe vers la DROITE -> Page Précédente
                if (currentIndex > 0) {
                    currentIndex--;
                    playSound();
                    updateUI();
                }
            }
        }

        // Support du clic pour Desktop
        mainContent.addEventListener('click', (e) => {
            const width = window.innerWidth;
            if (e.clientX > width / 2) {
                if (currentIndex < images.length - 1) { currentIndex++; playSound(); updateUI(); }
            } else {
                if (currentIndex > 0) { currentIndex--; playSound(); updateUI(); }
            }
        });

        init();
    </script>
</body>
</html>
