<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speisekarte | Gastro HALLE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        :root {
            --accent: #c96a2b;
            --cream: #f8f4ee;
            --dark: #0f0f0f;
            --page-w: 420px; 
            --page-h: 580px;
            --anim-speed: 0.8s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--dark);
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: var(--cream);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* --- NAVBAR --- */
        #navbar {
            height: 60px;
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(17, 17, 17, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }
        .brand { display: flex; align-items: center; gap: 8px; text-decoration: none; color: white; }
        .nav-logo { height: 32px; width: auto; border-radius: 4px; }
        .brand-text { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; }
        .nav-cta { padding: 0.5rem 1rem; border: 1px solid var(--accent); border-radius: 50px; color: var(--accent); text-decoration: none; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        .nav-cta:hover { background: var(--accent); color: white; }

        /* --- SCÈNE DU LIVRE --- */
        #main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2000px;
            padding: 20px;
            overflow: hidden;
        }

        #book-container {
            position: relative;
            width: var(--page-w);
            height: var(--page-h);
            transform-style: preserve-3d;
            transition: transform var(--anim-speed) cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        /* Desktop: shift right when open to show both pages centered */
        @media (min-width: 851px) {
            #book-container.is-open { transform: translateX(50%); }
        }

        .sheet {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform var(--anim-speed) cubic-bezier(0.645, 0.045, 0.355, 1);
            z-index: 1;
        }

        .page-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 0 4px 4px 0;
            overflow: hidden;
            background: #1a1a1a;
            box-shadow: 0 5px 25px rgba(0,0,0,0.8);
        }

        .page-face img { width: 100%; height: 100%; object-fit: contain; background: #000; }

        /* Inner Shadow for the fold */
        .page-face::after {
            content: ''; position: absolute; top: 0; left: 0; width: 40px; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.4), transparent);
            pointer-events: none;
        }

        .back { transform: rotateY(180deg); }
        .sheet.flipped { transform: rotateY(-180deg); }

        /* Interaction Layer */
        .click-layer {
            position: absolute; width: 100%; height: 100%; z-index: 500;
            display: flex; pointer-events: none;
        }
        .click-area { flex: 1; pointer-events: auto; cursor: pointer; }

        /* --- FOOTER --- */
        #footer-controls {
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 10, 0.95);
            gap: 8px;
            z-index: 1000;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .page-info { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--accent); letter-spacing: 1px; }
        .progress-bar { width: 150px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; }
        #progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.4s; }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 850px) {
            :root {
                --page-w: 88vw; 
                --page-h: 60vh; 
            }
            #main-content { perspective: 1500px; }
            
            /* Shift the book right when open so the flipped page (on the left) stays on screen */
            #book-container.is-open-mobile {
                transform: translateX(44vw) scale(0.95);
            }
            
            .brand-text { display: none; }
            .nav-cta { font-size: 0.6rem; padding: 0.4rem 0.8rem; }
        }
    </style>
</head>
<body>

    <audio id="flip-sound" src="https://www.soundjay.com/misc/sounds/page-flip-01a.mp3" preload="auto"></audio>

    <nav id="navbar">
        <a href="index.html" class="brand">
            <img src="logo.jpg" alt="Logo" class="nav-logo">
            <span class="brand-text">Gastro HALLE</span>
        </a>
        <a href="index.html" class="nav-cta">Startseite</a>
    </nav>

    <div id="main-content">
        <div id="book-container">
            </div>
        <div class="click-layer">
            <div class="click-area" onclick="prevSheet()"></div>
            <div class="click-area" onclick="nextSheet()"></div>
        </div>
    </div>

    <div id="footer-controls">
        <div class="page-info">SEITE <span id="current-page">1</span> / 14</div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div style="font-size: 0.6rem; color: #888; text-transform: uppercase; letter-spacing: 1.5px;">
            <i class="fa-solid fa-arrows-left-right"></i> Tippen zum Blättern
        </div>
    </div>

    <script>
        const totalImages = 14;
        const totalSheets = totalImages / 2;
        let currentIdx = 0;
        const container = document.getElementById('book-container');
        const audio = document.getElementById('flip-sound');

        function init() {
            for (let i = 0; i < totalSheets; i++) {
                const sheet = document.createElement('div');
                sheet.className = 'sheet';
                sheet.style.zIndex = totalSheets - i;
                
                const p1 = (i * 2) + 1;
                const p2 = (i * 2) + 2;

                sheet.innerHTML = `
                    <div class="page-face front"><img src="Pmenu/imag-${p1}.png" alt="Page ${p1}"></div>
                    <div class="page-face back"><img src="Pmenu/imag-${p2}.png" alt="Page ${p2}"></div>
                `;
                container.appendChild(sheet);
            }
            updateUI();
        }

        function nextSheet() {
            if (currentIdx < totalSheets) {
                const sheets = document.querySelectorAll('.sheet');
                sheets[currentIdx].classList.add('flipped');
                currentIdx++;
                playSound();
                updateUI();
            }
        }

        function prevSheet() {
            if (currentIdx > 0) {
                currentIdx--;
                const sheets = document.querySelectorAll('.sheet');
                sheets[currentIdx].classList.remove('flipped');
                playSound();
                updateUI();
            }
        }

        function playSound() {
            audio.currentTime = 0;
            audio.play().catch(() => {});
        }

        function updateUI() {
            const isMobile = window.innerWidth <= 850;
            
            // Handle Position Classes
            if (currentIdx > 0) {
                if (isMobile) {
                    container.classList.add('is-open-mobile');
                    container.classList.remove('is-open');
                } else {
                    container.classList.add('is-open');
                    container.classList.remove('is-open-mobile');
                }
            } else {
                container.classList.remove('is-open', 'is-open-mobile');
            }

            // Handle Z-Index layers
            const sheets = document.querySelectorAll('.sheet');
            sheets.forEach((s, i) => {
                if (i < currentIdx) {
                    s.style.zIndex = i + 1;
                } else {
                    s.style.zIndex = totalSheets - i;
                }
            });

            // Update Progress
            let displayPage = currentIdx === 0 ? 1 : (currentIdx * 2);
            if (currentIdx === totalSheets) displayPage = totalImages;
            
            document.getElementById('current-page').innerText = displayPage;
            const progress = (currentIdx / totalSheets) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
        }

        window.addEventListener('resize', updateUI);
        init();
    </script>
</body>
</html>
