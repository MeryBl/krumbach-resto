<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speisekarte | Gastro HALLE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        :root {
            --accent: #c96a2b;
            --cream: #f8f4ee;
            --dark: #0f0f0f;
            --page-w: 400px; /* Largeur d'une seule page */
            --page-h: 560px;
            --anim-speed: 0.8s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--dark);
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: var(--cream);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- NAVBAR --- */
        #navbar {
            height: 70px;
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(17, 17, 17, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 1000;
        }

        .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; }
        .nav-logo { height: 40px; width: auto; }
        .brand-text { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; }

        .nav-cta {
            padding: 0.6rem 1.2rem;
            border: 1px solid var(--accent);
            border-radius: 50px;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .nav-cta:hover { background: var(--accent); color: white; }

        /* --- SCÈNE DU LIVRE --- */
        #main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2000px;
        }

        #book-container {
            position: relative;
            width: var(--page-w);
            height: var(--page-h);
            transform-style: preserve-3d;
            transition: transform var(--anim-speed) ease-in-out;
            /* Décalage initial pour centrer la couverture */
            transform: translateX(0); 
        }

        /* Quand le livre est ouvert, on décale le pivot vers la droite pour que l'ensemble soit centré */
        #book-container.is-open {
            transform: translateX(50%);
        }

        .sheet {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform var(--anim-speed) cubic-bezier(0.645, 0.045, 0.355, 1);
            z-index: 1;
        }

        .page-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 0 4px 4px 0;
            overflow: hidden;
            background: #1a1a1a;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.5);
        }

        .page-face img { width: 100%; height: 100%; object-fit: cover; }

        /* Effet de pliure */
        .page-face::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.2) 0%, transparent 10%, transparent 90%, rgba(0,0,0,0.1) 100%);
            pointer-events: none;
        }

        .back { transform: rotateY(180deg); }

        .sheet.flipped { transform: rotateY(-180deg); }

        /* Zones de clic */
        .click-layer {
            position: absolute;
            width: 100vw;
            height: 100%;
            z-index: 500;
            display: flex;
            pointer-events: none;
        }
        .click-area {
            flex: 1;
            pointer-events: auto;
            cursor: pointer;
        }

        /* --- FOOTER --- */
        #footer-controls {
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 10, 0.9);
            gap: 8px;
        }

        .page-info {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            letter-spacing: 1px;
            color: var(--accent);
        }

        .progress-bar { width: 150px; height: 1px; background: rgba(255,255,255,0.1); }
        #progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.4s; }

        /* MOBILE */
        @media (max-width: 850px) {
            #book-container.is-open { transform: translateX(0); } /* On ne décale pas sur mobile */
            :root { --page-w: 80vw; --page-h: 60vh; }
        }
    </style>
</head>
<body>

    <audio id="flip-sound" src="https://www.soundjay.com/misc/sounds/page-flip-01a.mp3" preload="auto"></audio>

    <nav id="navbar">
        <a href="index.html" class="brand">
            <img src="logo.jpg" alt="Gastro HALLE" class="nav-logo">
            <span class="brand-text">Gastro HALLE</span>
        </a>
        <a href="index.html" class="nav-cta">Startseite</a>
    </nav>

    <div id="main-content">
        <div id="book-container">
            </div>
        
        <div class="click-layer">
            <div class="click-area" onclick="prevSheet()"></div>
            <div class="click-area" onclick="nextSheet()"></div>
        </div>
    </div>

    <div id="footer-controls">
        <div class="page-info">
            SEITE <span id="current-page">1</span> VON 14
        </div>
        <div class="progress-bar">
            <div id="progress-fill"></div>
        </div>
        <div style="font-size: 0.55rem; color: #666; text-transform: uppercase; letter-spacing: 2px;">
            Links oder rechts klicken zum Umblättern
        </div>
    </div>

    <script>
        const totalImages = 14;
        const totalSheets = totalImages / 2;
        let currentIdx = 0;
        const container = document.getElementById('book-container');
        const audio = document.getElementById('flip-sound');

        function init() {
            for (let i = 0; i < totalSheets; i++) {
                const sheet = document.createElement('div');
                sheet.className = 'sheet';
                sheet.style.zIndex = totalSheets - i;
                
                const p1 = (i * 2) + 1;
                const p2 = (i * 2) + 2;

                sheet.innerHTML = `
                    <div class="page-face front"><img src="Pmenu/imag-${p1}.png"></div>
                    <div class="page-face back"><img src="Pmenu/imag-${p2}.png"></div>
                `;
                container.appendChild(sheet);
            }
            updateUI();
        }

        function nextSheet() {
            if (currentIdx < totalSheets) {
                const sheets = document.querySelectorAll('.sheet');
                sheets[currentIdx].classList.add('flipped');
                // Gestion de l'empilement (Z-index)
                setTimeout(() => {
                    sheets[currentIdx-1].style.zIndex = currentIdx;
                }, 100);
                
                currentIdx++;
                audio.currentTime = 0; audio.play().catch(()=>{});
                updateUI();
            }
        }

        function prevSheet() {
            if (currentIdx > 0) {
                currentIdx--;
                const sheets = document.querySelectorAll('.sheet');
                sheets[currentIdx].classList.remove('flipped');
                sheets[currentIdx].style.zIndex = totalSheets - currentIdx;
                
                audio.currentTime = 0; audio.play().catch(()=>{});
                updateUI();
            }
        }

        function updateUI() {
            // Gérer le centrage dynamique
            if (currentIdx > 0) {
                container.classList.add('is-open');
            } else {
                container.classList.remove('is-open');
            }

            // Calcul de la page affichée
            let displayPage = currentIdx === 0 ? 1 : (currentIdx * 2);
            document.getElementById('current-page').innerText = displayPage;
            
            const progress = (currentIdx / totalSheets) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
        }

        init();
    </script>
</body>
</html>
