<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speisekarte | Gastro HALLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        :root {
            --gold: #c9a96e;
            --gold-light: #e8d5b0;
            --ink: #0d0d0d;
            --cream: #faf6f0;
            --flip-speed: 0.8s;
            --nav-h: 64px;
            --foot-h: 80px;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            height: 100vh;
            background: var(--ink);
            color: var(--cream);
            font-family: 'Jost', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── SCENE & PERSPECTIVE ── */
        #viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2000px;
            padding: 20px;
            position: relative;
        }

        /* ── BOOK CONTAINER ── */
        #book {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
            /* width/height gérés par JS */
        }

        /* ── SHEET LOGIC ── */
        .sheet {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
            transform-origin: left center;
            transition: transform var(--flip-speed) cubic-bezier(0.645, 0.045, 0.355, 1);
            pointer-events: none;
        }

        /* Desktop: On veut que la feuille pivote depuis le centre */
        @media (min-width: 768px) {
            #book.spread { transform: translateX(50%); } /* Décale le livre pour centrer la reliure */
            .sheet { transform-origin: left center; }
        }

        .sheet.flipped {
            transform: rotateY(-180deg);
        }

        .page-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            background: #111;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
            pointer-events: auto;
        }

        .page-face.back {
            transform: rotateY(180deg);
        }

        .page-face img {
            width: 100%; height: 100%;
            object-fit: contain;
            user-select: none;
        }

        /* Spine Shadow */
        .front::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.4) 0%, transparent 10%, transparent 100%);
        }
        .back::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to left, rgba(0,0,0,0.4) 0%, transparent 10%, transparent 100%);
        }

        /* ── UI ELEMENTS ── */
        #navbar {
            height: var(--nav-h);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; border-bottom: 1px solid rgba(201,169,110,0.2);
            z-index: 100; background: var(--ink);
        }

        #footer {
            height: var(--foot-h);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-top: 1px solid rgba(201,169,110,0.2);
            z-index: 100; background: var(--ink);
        }

        .nav-btn {
            color: var(--gold); border: 1px solid var(--gold);
            padding: 5px 15px; border-radius: 20px; text-decoration: none; font-size: 0.8rem;
        }

        .controls {
            display: flex; gap: 30px; margin-top: 10px;
        }

        .control-btn {
            background: none; border: none; color: var(--gold);
            font-size: 1.5rem; cursor: pointer; transition: 0.3s;
        }

        .control-btn:disabled { color: #333; cursor: default; }

        /* Loader */
        #loader {
            position: fixed; inset:0; background: var(--ink);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .hidden { opacity: 0; pointer-events: none; transition: 0.8s; }
    </style>
</head>
<body>

<div id="loader">Lade Menü...</div>

<nav id="navbar">
    <div class="brand-name" style="color: var(--gold); letter-spacing: 2px;">GASTRO HALLE</div>
    <div id="page-info">1 / 14</div>
    <a href="#" class="nav-btn">HOME</a>
</nav>

<main id="viewport">
    <div id="book">
        </div>
</main>

<footer id="footer">
    <div id="label">Speisekarte</div>
    <div class="controls">
        <button class="control-btn" id="prevBtn"><i class="fa fa-chevron-left"></i></button>
        <button class="control-btn" id="nextBtn"><i class="fa fa-chevron-right"></i></button>
    </div>
</footer>

<script>
    const TOTAL_PAGES = 14; 
    const book = document.getElementById('book');
    const pageInfo = document.getElementById('page-info');
    const label = document.getElementById('label');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    
    let currentSheet = 0;
    const totalSheets = TOTAL_PAGES / 2;
    const sheets = [];

    function initBook() {
        const isMobile = window.innerWidth < 768;
        const vW = window.innerWidth;
        const vH = window.innerHeight - 144; // h-nav - h-foot

        // Calcul des dimensions (Ratio 3:4)
        let w, h;
        if (isMobile) {
            w = Math.min(vW * 0.85, 400);
            h = w * 1.4;
            book.classList.remove('spread');
        } else {
            h = Math.min(vH * 0.8, 600);
            w = (h * 0.75);
            book.classList.add('spread');
        }

        book.style.width = w + 'px';
        book.style.height = h + 'px';

        book.innerHTML = '';
        sheets.length = 0;

        for (let i = 0; i < totalSheets; i++) {
            const sheet = document.createElement('div');
            sheet.className = 'sheet';
            sheet.style.zIndex = totalSheets - i;

            const p1 = i * 2 + 1;
            const p2 = i * 2 + 2;

            sheet.innerHTML = `
                <div class="page-face front">
                    <img src="Pmenu/imag-${p1}.png" alt="P${p1}">
                </div>
                <div class="page-face back">
                    <img src="Pmenu/imag-${p2}.png" alt="P${p2}">
                </div>
            `;
            
            book.appendChild(sheet);
            sheets.push(sheet);
        }
        updateUI();
    }

    function updateUI() {
        sheets.forEach((sheet, idx) => {
            if (idx < currentSheet) {
                sheet.classList.add('flipped');
                sheet.style.zIndex = idx + 1;
            } else {
                sheet.classList.remove('flipped');
                sheet.style.zIndex = totalSheets - idx;
            }
        });

        const displayPage = currentSheet === 0 ? 1 : currentSheet * 2;
        pageInfo.textContent = `${displayPage} / ${TOTAL_PAGES}`;
        label.textContent = currentSheet === 0 ? "Cover" : `Seite ${currentSheet * 2} - ${currentSheet * 2 + 1}`;
        
        prevBtn.disabled = currentSheet === 0;
        nextBtn.disabled = currentSheet === totalSheets;
    }

    function next() {
        if (currentSheet < totalSheets) {
            currentSheet++;
            updateUI();
        }
    }

    function prev() {
        if (currentSheet > 0) {
            currentSheet--;
            updateUI();
        }
    }

    // Events
    nextBtn.addEventListener('click', next);
    prevBtn.addEventListener('click', prev);
    
    // Swipe
    let touchStart = 0;
    document.addEventListener('touchstart', e => touchStart = e.touches[0].clientX);
    document.addEventListener('touchend', e => {
        const delta = e.changedTouches[0].clientX - touchStart;
        if (Math.abs(delta) > 50) {
            delta > 0 ? prev() : next();
        }
    });

    window.addEventListener('resize', initBook);
    window.addEventListener('load', () => {
        initBook();
        setTimeout(() => document.getElementById('loader').classList.add('hidden'), 500);
    });

    // Keyboard
    document.addEventListener('keydown', e => {
        if (e.key === "ArrowRight") next();
        if (e.key === "ArrowLeft") prev();
    });
</script>

</body>
</html>
