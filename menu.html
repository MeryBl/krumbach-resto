<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speisekarte | Gastro HALLE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Plus+Jakarta+Sans:wght@300;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #d4af37; 
            --cream: #fdfaf5;
            --dark: #0a0a0a;
            --page-w: 360px; 
            --page-h: 520px;
            --anim-speed: 0.9s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--dark);
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            color: var(--cream);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- NAVBAR --- */
        #navbar {
            height: 60px;
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            z-index: 1000;
        }
        .brand-text { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; }

        /* --- BOOK SCENE --- */
        #main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2000px;
            padding: 20px;
        }

        #book-container {
            position: relative;
            width: var(--page-w);
            height: var(--page-h);
            transform-style: preserve-3d;
            transition: transform var(--anim-speed) cubic-bezier(0.645, 0.045, 0.355, 1);
            /* Initial state: Centered */
            transform: translateX(0); 
        }

        /* Open State: Shifts right to make room for the left page */
        .is-open { transform: translateX(45%) !important; }

        .sheet {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform var(--anim-speed) cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .page-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            background: #111;
            overflow: hidden;
            border-radius: 2px 4px 4px 2px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        .page-face img { width: 100%; height: 100%; object-fit: contain; }

        /* Shadows for depth */
        .page-face::after {
            content: ''; position: absolute; top: 0; width: 40px; height: 100%;
            pointer-events: none; z-index: 5;
        }
        .front::after { left: 0; background: linear-gradient(to right, rgba(0,0,0,0.4), transparent); }
        .back::after { right: 0; background: linear-gradient(to left, rgba(0,0,0,0.4), transparent); }

        .back { transform: rotateY(180deg); }
        .sheet.flipped { transform: rotateY(-180deg); }

        /* Interaction zones */
        .click-layer {
            position: absolute; width: 200%; height: 100%; left: -50%; top: 0;
            z-index: 999; display: flex; pointer-events: none;
        }
        .click-area { flex: 1; pointer-events: auto; cursor: pointer; }

        /* --- FOOTER --- */
        #footer-controls {
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .page-info { font-family: 'Cormorant Garamond', serif; font-size: 0.9rem; color: var(--accent); letter-spacing: 2px; }
        .progress-bar { width: 120px; height: 1px; background: rgba(212, 175, 55, 0.2); }
        #progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.5s; }

        /* Mobile specific adjustments */
        @media (max-width: 850px) {
            :root { --page-w: 80vw; --page-h: 60vh; }
            .is-open { transform: translateX(40%) !important; }
        }
    </style>
</head>
<body>

    <audio id="flip-sound" src="https://www.soundjay.com/misc/sounds/page-flip-01a.mp3" preload="auto"></audio>

    <nav id="navbar">
        <div class="brand-text">Gastro Halle</div>
        <div style="font-size: 10px; color: #666; letter-spacing: 1px;">MENU</div>
    </nav>

    <div id="main-content">
        <div id="book-container"></div>
        <div class="click-layer">
            <div class="click-area" onclick="prevSheet()"></div>
            <div class="click-area" onclick="nextSheet()"></div>
        </div>
    </div>

    <div id="footer-controls">
        <div class="page-info"><span id="page-label">LADEN...</span></div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <script>
        const totalImages = 14; 
        const container = document.getElementById('book-container');
        const audio = document.getElementById('flip-sound');
        let currentIdx = 0;

        // Configuration
        const path = "Pmenu/"; 
        const leftImgPath = path + "imag-left.png";
        const endImgPath = path + "imag-end.png";

        function init() {
            // Sheet 1 to 13: Front = Menu, Back = imag-left
            for (let i = 1; i < totalImages; i++) {
                createSheet(path + `imag-${i}.png`, leftImgPath, 100 - i);
            }
            // Final Sheet: Front = last menu page, Back = imag-end
            createSheet(path + `imag-${totalImages}.png`, endImgPath, 0);

            updateUI();
        }

        function createSheet(front, back, z) {
            const sheet = document.createElement('div');
            sheet.className = 'sheet';
            sheet.style.zIndex = z;
            sheet.innerHTML = `
                <div class="page-face front"><img src="${front}" onerror="this.src='https://via.placeholder.com/400x600?text=Menu+Page'"></div>
                <div class="page-face back"><img src="${back}" onerror="this.src='https://via.placeholder.com/400x600?text=Left+Side'"></div>
            `;
            container.appendChild(sheet);
        }

        function nextSheet() {
            const sheets = document.querySelectorAll('.sheet');
            if (currentIdx < sheets.length) {
                sheets[currentIdx].classList.add('flipped');
                currentIdx++;
                playFlip();
                updateUI();
            }
        }

        function prevSheet() {
            if (currentIdx > 0) {
                currentIdx--;
                const sheets = document.querySelectorAll('.sheet');
                sheets[currentIdx].classList.remove('flipped');
                playFlip();
                updateUI();
            }
        }

        function playFlip() {
            audio.currentTime = 0;
            audio.play().catch(()=>{});
        }

        function updateUI() {
            const sheets = document.querySelectorAll('.sheet');
            
            // LOGIC FOR CENTERING:
            // If currentIdx is 0 (First Page) OR currentIdx is sheets.length (Last Page flipped)
            // The book should be in the middle.
            if (currentIdx > 0 && currentIdx < sheets.length) {
                container.classList.add('is-open');
            } else {
                container.classList.remove('is-open');
            }

            // Depth management
            sheets.forEach((s, i) => {
                if (i < currentIdx) s.style.zIndex = i + 1;
                else s.style.zIndex = sheets.length - i;
            });

            // Text Update
            const label = document.getElementById('page-label');
            if (currentIdx === 0) {
                label.innerText = "WILLKOMMEN";
            } else if (currentIdx === sheets.length) {
                label.innerText = "DANKE FÜR IHREN BESUCH";
            } else {
                label.innerText = `SEITE ${currentIdx} / ${totalImages}`;
            }

            const progress = (currentIdx / sheets.length) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
        }

        init();
    </script>
</body>
</html>
